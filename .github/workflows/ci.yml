name: backend-ci

on:
  push:
    paths:
      - 'kaya-backend/**'
  pull_request:
    paths:
      - 'kaya-backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kaya-backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - run: npm test
